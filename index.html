<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desenvolvendo soluções, criando possibilidades.</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#1f2937;
      --primary2:#374151;
      --success:#15803d;
      --danger:#dc2626;
      --warning:#d97706;
      --radius:18px;
      --shadow:0 10px 28px rgba(15,23,42,.08);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding-bottom:30px;
    }

    .topo{
      background:#fff;
      border-bottom:1px solid var(--line);
      padding:18px 16px 12px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:1000;
      box-shadow:0 4px 18px rgba(15,23,42,.06);
    }

    .topo h1{
      font-size:24px;
      line-height:1.15;
      font-weight:800;
      color:var(--primary);
      margin-bottom:4px;
    }

    .topo .autor{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
      margin-bottom:12px;
    }

    .busca-wrap{
      width:100%;
      max-width:980px;
      margin:0 auto;
      display:flex;
      gap:8px;
      align-items:center;
    }

    .busca-wrap input{
      flex:1;
      height:42px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:0 16px;
      font-size:15px;
      outline:none;
      background:#f9fafb;
    }

    .busca-wrap input:focus{
      border-color:#9ca3af;
      background:#fff;
    }

    .btn-admin-top{
      height:42px;
      border:none;
      border-radius:999px;
      background:var(--primary);
      color:#fff;
      font-weight:700;
      padding:0 16px;
      cursor:pointer;
      white-space:nowrap;
    }

    .container{
      width:min(1180px,94%);
      margin:18px auto;
    }

    .marcas{
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding:4px 2px 12px;
      margin-bottom:12px;
      scrollbar-width:none;
    }
    .marcas::-webkit-scrollbar{display:none}

    .marca-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--primary);
      padding:11px 18px;
      border-radius:999px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(15,23,42,.05);
      white-space:nowrap;
      transition:.2s;
    }

    .marca-btn:hover,
    .marca-btn.ativa{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .grade{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:18px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:280px;
      position:relative;
    }

    .thumb{
      height:150px;
      background:linear-gradient(135deg,#f9fafb,#eef2f7);
      display:flex;
      align-items:center;
      justify-content:center;
      border-bottom:1px solid var(--line);
      padding:14px;
    }

    .thumb .pdf-icon{
      width:72px;
      height:88px;
      border-radius:12px;
      background:#ef4444;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:22px;
      box-shadow:0 10px 22px rgba(239,68,68,.24);
    }

    .card-body{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
      flex:1;
    }

    .tag{
      display:inline-flex;
      align-self:flex-start;
      background:#f3f4f6;
      color:#374151;
      border-radius:999px;
      padding:4px 9px;
      font-size:11px;
      font-weight:800;
    }

    .card h3{
      font-size:16px;
      line-height:1.25;
      color:#111827;
      word-break:break-word;
    }

    .preco{
      font-size:14px;
      color:var(--success);
      font-weight:900;
    }

    .card-actions{
      margin-top:auto;
      display:grid;
      gap:8px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      text-align:center;
      text-decoration:none;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .btn-ver{background:var(--primary);color:#fff}
    .btn-edit{background:#fef3c7;color:#92400e}
    .btn-del{background:#fee2e2;color:#991b1b}
    .btn-save{background:var(--success);color:#fff}
    .btn-cancel{background:#e5e7eb;color:#111827}

    .admin-actions{
      display:none;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    body.admin-on .admin-actions{display:grid}

    .vazio{
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:18px;
      padding:30px;
      text-align:center;
      color:var(--muted);
      grid-column:1/-1;
    }

    .modal-bg{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.55);
      z-index:2000;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .modal-bg.ativo{display:flex}

    .modal{
      width:min(520px,100%);
      background:#fff;
      border-radius:22px;
      box-shadow:0 25px 70px rgba(0,0,0,.25);
      padding:20px;
    }

    .modal h2{
      font-size:22px;
      margin-bottom:12px;
      color:#111827;
    }

    .form-grid{
      display:grid;
      gap:10px;
    }

    label{
      font-size:12px;
      font-weight:900;
      color:#374151;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    input, select{
      width:100%;
      height:42px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:0 12px;
      font-size:14px;
      outline:none;
      background:#f9fafb;
    }

    input:focus, select:focus{
      background:#fff;
      border-color:#9ca3af;
    }

    .modal-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .admin-panel{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-bottom:14px;
      display:none;
      box-shadow:var(--shadow);
    }
    body.admin-on .admin-panel{display:block}

    .admin-panel-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .admin-panel strong{font-size:16px}

    footer{
      width:min(1180px,94%);
      margin:28px auto 0;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding:16px;
    }

    @media(max-width:768px){
      .topo{
        padding:12px 10px 10px;
      }
      .topo h1{
        font-size:17px;
      }
      .topo .autor{
        font-size:11px;
        margin-bottom:8px;
      }
      .busca-wrap{
        gap:6px;
      }
      .busca-wrap input{
        height:38px;
        font-size:13px;
        padding:0 12px;
      }
      .btn-admin-top{
        height:38px;
        padding:0 11px;
        font-size:12px;
      }
      .container{
        width:96%;
        margin-top:10px;
      }
      .marcas{
        gap:7px;
        padding-bottom:9px;
      }
      .marca-btn{
        padding:8px 12px;
        font-size:12px;
      }
      .grade{
        grid-template-columns:repeat(3,1fr);
        gap:8px;
      }
      .card{
        min-height:0;
        border-radius:13px;
      }
      .thumb{
        height:78px;
        padding:8px;
      }
      .thumb .pdf-icon{
        width:42px;
        height:52px;
        border-radius:8px;
        font-size:13px;
      }
      .card-body{
        padding:7px;
        gap:5px;
      }
      .tag{
        font-size:9px;
        padding:3px 6px;
      }
      .card h3{
        font-size:11px;
        line-height:1.15;
        min-height:25px;
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
      }
      .preco{
        font-size:11px;
      }
      .btn{
        font-size:10px;
        padding:7px 6px;
        border-radius:9px;
      }
      .admin-actions{
        grid-template-columns:1fr;
        gap:5px;
      }
      .modal{
        border-radius:18px;
        padding:16px;
      }
    }

    @media(max-width:390px){
      .grade{
        grid-template-columns:repeat(2,1fr);
      }
      .thumb{height:86px}
      .card h3{font-size:12px}
    }
  </style>
</head>
<body>

  <header class="topo">
    <h1>Desenvolvendo soluções, criando possibilidades.</h1>
    <div class="autor">Deverli Oliveira</div>
    <div class="busca-wrap">
      <input id="busca" type="search" placeholder="Pesquisar catálogo, marca ou preço..." oninput="filtrarCatalogos()" />
      <button class="btn-admin-top" onclick="abrirLoginAdmin()" id="btnAdminTopo">Admin</button>
    </div>
  </header>

  <main class="container">
    <section class="admin-panel">
      <div class="admin-panel-top">
        <strong>Painel administrador ativo</strong>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-save" onclick="abrirModalCatalogo()">+ Adicionar catálogo</button>
          <button class="btn btn-cancel" onclick="sairAdmin()">Sair do admin</button>
        </div>
      </div>
    </section>

    <nav class="marcas" id="marcas"></nav>
    <section class="grade" id="grade"></section>
  </main>

  <footer>
    © 2026 Deverli Oliveira • Todos os direitos reservados
  </footer>

  <div class="modal-bg" id="modalLogin">
    <div class="modal">
      <h2>Acesso administrador</h2>
      <div class="form-grid">
        <div>
          <label>E-mail</label>
          <input id="adminEmail" type="email" placeholder="Digite o e-mail admin" />
        </div>
        <div>
          <label>Senha</label>
          <input id="adminSenha" type="password" placeholder="Digite a senha admin" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="fecharLoginAdmin()">Cancelar</button>
        <button class="btn btn-save" onclick="entrarAdmin()">Entrar</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="modalCatalogo">
    <div class="modal">
      <h2 id="tituloModalCatalogo">Adicionar catálogo</h2>
      <input type="hidden" id="catalogoId" />
      <div class="form-grid">
        <div>
          <label>Nome do catálogo</label>
          <input id="catalogoNome" placeholder="Ex: Catálogo TATU Peças" />
        </div>
        <div>
          <label>Marca</label>
          <select id="catalogoMarca">
            <option value="TATU">TATU</option>
            <option value="BALDAN">BALDAN</option>
            <option value="JACTO">JACTO</option>
            <option value="JUMIL">JUMIL</option>
            <option value="STARA">STARA</option>
          </select>
        </div>
        <div>
          <label>Preço</label>
          <input id="catalogoPreco" placeholder="Ex: 49,90" inputmode="decimal" />
        </div>
        <div>
          <label>URL do arquivo PDF</label>
          <input id="catalogoArquivo" placeholder="Cole aqui o link do PDF" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="fecharModalCatalogo()">Cancelar</button>
        <button class="btn btn-save" onclick="salvarCatalogo()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wxagsbsfrlenriedzeuv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9E6BgYYsC1W0tyGijpARTw_LHXQ8bQI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ADMIN_EMAIL = 'admin@admin.com';
    const ADMIN_SENHA = '123456';

    const marcasFixas = ['TODOS','TATU','BALDAN','JACTO','JUMIL','STARA'];
    let marcaAtual = 'TODOS';
    let catalogos = [];

    const exemplos = [
      { id:'local-1', nome:'Catálogo TATU', marca:'TATU', preco:'0,00', arquivo_url:'#' },
      { id:'local-2', nome:'Catálogo BALDAN', marca:'BALDAN', preco:'0,00', arquivo_url:'#' }
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      if(localStorage.getItem('admin_catalogos') === 'sim') ativarAdmin();
      renderMarcas();
      await carregarCatalogos();
    });

    function renderMarcas(){
      const nav = document.getElementById('marcas');
      nav.innerHTML = '';
      marcasFixas.forEach(marca => {
        const btn = document.createElement('button');
        btn.className = 'marca-btn' + (marca === marcaAtual ? ' ativa' : '');
        btn.textContent = marca;
        btn.onclick = () => {
          marcaAtual = marca;
          renderMarcas();
          filtrarCatalogos();
        };
        nav.appendChild(btn);
      });
    }

    async function carregarCatalogos(){
      try{
        const { data, error } = await supabaseClient
          .from('catalogos')
          .select('*')
          .order('id', { ascending:false });

        if(error) throw error;
        catalogos = Array.isArray(data) && data.length ? data : exemplos;
      }catch(err){
        catalogos = exemplos;
        console.warn('Não foi possível carregar do Supabase:', err.message);
      }
      filtrarCatalogos();
    }

    function filtrarCatalogos(){
      const termo = (document.getElementById('busca').value || '').toLowerCase().trim();
      const lista = catalogos.filter(cat => {
        const marca = (cat.marca || '').toUpperCase();
        const texto = `${cat.nome || ''} ${cat.marca || ''} ${cat.preco || ''}`.toLowerCase();
        const passaMarca = marcaAtual === 'TODOS' || marca === marcaAtual;
        const passaBusca = !termo || texto.includes(termo);
        return passaMarca && passaBusca;
      });
      renderCatalogos(lista);
    }

    function renderCatalogos(lista){
      const grade = document.getElementById('grade');
      grade.innerHTML = '';

      if(!lista.length){
        grade.innerHTML = '<div class="vazio">Nenhum catálogo encontrado.</div>';
        return;
      }

      lista.forEach(cat => {
        const id = cat.id;
        const nome = escapar(cat.nome || 'Catálogo sem nome');
        const marca = escapar((cat.marca || 'GERAL').toUpperCase());
        const preco = formatarPreco(cat.preco);
        const arquivo = cat.arquivo_url || cat.arquivo || cat.url || '#';

        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="thumb"><div class="pdf-icon">PDF</div></div>
          <div class="card-body">
            <span class="tag">${marca}</span>
            <h3 title="${nome}">${nome}</h3>
            <div class="preco">${preco}</div>
            <div class="card-actions">
              <a class="btn btn-ver" href="${arquivo}" target="_blank" rel="noopener">Ver PDF</a>
              <div class="admin-actions">
                <button class="btn btn-edit" onclick="editarCatalogo('${id}')">Editar</button>
                <button class="btn btn-del" onclick="excluirCatalogo('${id}')">Excluir</button>
              </div>
            </div>
          </div>
        `;
        grade.appendChild(card);
      });
    }

    function formatarPreco(valor){
      if(valor === null || valor === undefined || valor === '') return 'R$ 0,00';
      const texto = String(valor).replace('R$','').trim();
      return texto.startsWith('R$') ? texto : `R$ ${texto}`;
    }

    function escapar(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    function abrirLoginAdmin(){
      if(document.body.classList.contains('admin-on')){
        abrirModalCatalogo();
        return;
      }
      document.getElementById('modalLogin').classList.add('ativo');
    }

    function fecharLoginAdmin(){
      document.getElementById('modalLogin').classList.remove('ativo');
    }

    function entrarAdmin(){
      const email = document.getElementById('adminEmail').value.trim().toLowerCase();
      const senha = document.getElementById('adminSenha').value.trim();

      if(email === ADMIN_EMAIL && senha === ADMIN_SENHA){
        localStorage.setItem('admin_catalogos','sim');
        ativarAdmin();
        fecharLoginAdmin();
      }else{
        alert('E-mail ou senha incorretos.');
      }
    }

    function ativarAdmin(){
      document.body.classList.add('admin-on');
      document.getElementById('btnAdminTopo').textContent = '+ Catálogo';
    }

    function sairAdmin(){
      localStorage.removeItem('admin_catalogos');
      document.body.classList.remove('admin-on');
      document.getElementById('btnAdminTopo').textContent = 'Admin';
    }

    function abrirModalCatalogo(cat = null){
      document.getElementById('tituloModalCatalogo').textContent = cat ? 'Editar catálogo' : 'Adicionar catálogo';
      document.getElementById('catalogoId').value = cat?.id || '';
      document.getElementById('catalogoNome').value = cat?.nome || '';
      document.getElementById('catalogoMarca').value = (cat?.marca || 'TATU').toUpperCase();
      document.getElementById('catalogoPreco').value = cat?.preco || '';
      document.getElementById('catalogoArquivo').value = cat?.arquivo_url || cat?.arquivo || cat?.url || '';
      document.getElementById('modalCatalogo').classList.add('ativo');
    }

    function fecharModalCatalogo(){
      document.getElementById('modalCatalogo').classList.remove('ativo');
    }

    function editarCatalogo(id){
      const cat = catalogos.find(c => String(c.id) === String(id));
      if(!cat) return alert('Catálogo não encontrado.');
      abrirModalCatalogo(cat);
    }

    async function salvarCatalogo(){
      const id = document.getElementById('catalogoId').value;
      const nome = document.getElementById('catalogoNome').value.trim();
      const marca = document.getElementById('catalogoMarca').value.trim().toUpperCase();
      const preco = document.getElementById('catalogoPreco').value.trim();
      const arquivo_url = document.getElementById('catalogoArquivo').value.trim();

      if(!nome || !marca || !arquivo_url){
        alert('Preencha nome, marca e URL do PDF.');
        return;
      }

      const payload = { nome, marca, preco, arquivo_url };

      try{
        if(id && !String(id).startsWith('local-')){
          const { error } = await supabaseClient.from('catalogos').update(payload).eq('id', id);
          if(error) throw error;
        }else if(id && String(id).startsWith('local-')){
          catalogos = catalogos.map(c => String(c.id) === String(id) ? { ...c, ...payload } : c);
        }else{
          const { error } = await supabaseClient.from('catalogos').insert([payload]);
          if(error) throw error;
        }
        fecharModalCatalogo();
        await carregarCatalogos();
      }catch(err){
        alert('Erro ao salvar. Verifique se a tabela catalogos tem as colunas: nome, marca, preco, arquivo_url.');
        console.error(err);
      }
    }

    async function excluirCatalogo(id){
      if(!confirm('Deseja excluir este catálogo?')) return;

      try{
        if(String(id).startsWith('local-')){
          catalogos = catalogos.filter(c => String(c.id) !== String(id));
          filtrarCatalogos();
          return;
        }

        const { error } = await supabaseClient.from('catalogos').delete().eq('id', id);
        if(error) throw error;
        await carregarCatalogos();
      }catch(err){
        alert('Erro ao excluir catálogo.');
        console.error(err);
      }
    }

    document.addEventListener('keydown', e => {
      if(e.key === 'Escape'){
        fecharLoginAdmin();
        fecharModalCatalogo();
      }
    });
  </script>
</body>
</html>
